name: RDP Localtonet - The Flash VIP PRO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Setup RDP User
        run: |
          # Cho phép kết nối RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Tạo User và Password (Bạn có thể đổi greenboy123@ thành pass khác)
          $fixedPassword = "greenboy123@"
          New-LocalUser "greenboyMC" -Password (ConvertTo-SecureString -AsPlainText $fixedPassword -Force) -FullName "greenboyMC VIP" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "greenboyMC" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "greenboyMC" -ErrorAction SilentlyContinue
          
          # Tối ưu hóa Windows (Tắt các service thừa để máy mượt hơn)
          $services = @("SysMain","WSearch","wuauserv","WinDefend","DiagTrack","DPS","DoSvc","Spooler","Themes","BITS")
          foreach ($svc in $services) {
            Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
            Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
          }
          Write-Host "✅ Setup User & Windows xong!" -ForegroundColor Green

      - name: Install Localtonet
        run: |
          Invoke-WebRequest -Uri "https://localtonet.com/download/localtonet-windows-x64.zip" -OutFile localtonet.zip
          Expand-Archive localtonet.zip -DestinationPath .
          Write-Host "✅ Tải Localtonet thành công!" -ForegroundColor Green

      - name: Start Localtonet Tunnel
        env:
          L_TOKEN: ${{ secrets.LOCALTONET_TOKEN }}
        run: |
          # Cấu hình Token
          .\localtonet.exe authtoken $Env:L_TOKEN
          
          # Chạy Tunnel TCP cho port RDP (3389)
          Start-Process -WindowStyle Hidden -FilePath ".\localtonet.exe" -ArgumentList "tcp --port 3389"
          
          Write-Host "🚀 RDP ĐANG CHẠY!" -ForegroundColor Magenta
          Write-Host "1. Truy cập https://localtonet.com/tunnel/tcp" -ForegroundColor Cyan
          Write-Host "2. Copy địa chỉ IP:Port ở cột 'Server IP'" -ForegroundColor Cyan
          Write-Host "3. Username: greenboyMC | Pass: greenboy123@" -ForegroundColor Yellow

      - name: Keep Alive (6 hours)
        run: |
          Start-Sleep -Seconds 21600
